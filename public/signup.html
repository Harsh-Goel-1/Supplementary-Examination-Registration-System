<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up — Suppl. Exam Registration</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
</head>

<body>
  <nav class="navbar">
    <a href="/" class="nav-brand"><span class="brand-icon">📝</span> NITH Suppl. Exam</a>
    <div class="nav-links">
      <a href="/login.html" class="btn btn-ghost">Log In</a>
    </div>
  </nav>

  <main class="auth-page">
    <div class="auth-card">
      <h1>Create Account</h1>
      <p class="auth-sub">Use your <strong>@nith.ac.in</strong> college email</p>

      <div class="alert" id="alert" style="display:none;"></div>

      <form id="signup-form" autocomplete="off">
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" name="name" placeholder="Harsh Goel" required />
        </div>
        <div class="form-group">
          <label for="roll_no">Roll Number</label>
          <input type="text" id="roll_no" name="roll_no" placeholder="21MI535" required />
        </div>
        <div class="form-group">
          <label for="email">College Email</label>
          <input type="email" id="email" name="email" placeholder="21mi535@nith.ac.in" required />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Min 6 characters" required minlength="6" />
        </div>
        <button type="submit" class="btn btn-primary btn-block" id="signup-btn">Create Account</button>
      </form>

      <p class="auth-footer">Already have an account? <a href="/login.html">Log in</a></p>
    </div>
  </main>

  <script src="/js/auth.js"></script>
</body>

</html>
