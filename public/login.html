<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log In — Suppl. Exam Registration</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <nav class="navbar">
    <a href="/" class="nav-brand"><span class="brand-icon">📝</span> NITH Suppl. Exam</a>
    <div class="nav-links">
      <a href="/signup.html" class="btn btn-primary">Sign Up</a>
    </div>
  </nav>

  <main class="auth-page">
    <div class="auth-card">
      <h1>Welcome Back</h1>
      <p class="auth-sub">Log in with your college email</p>

      <div class="alert" id="alert" style="display:none;"></div>

      <form id="login-form" autocomplete="off">
        <div class="form-group">
          <label for="email">College Email</label>
          <input type="email" id="email" name="email" placeholder="21mi535@nith.ac.in" required />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Your password" required />
        </div>
        <button type="submit" class="btn btn-primary btn-block" id="login-btn">Log In</button>
      </form>

      <p class="auth-footer">Don't have an account? <a href="/signup.html">Sign up</a></p>
    </div>
  </main>

  <script src="/js/auth.js"></script>
</body>
</html>
